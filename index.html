<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☘️ Lucky St. Paddy's Wheel ☘️</title>
    <style>
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            background: radial-gradient(circle, #1a5e20 0%, #003300 100%);
            font-family: 'Comic Sans MS', 'Segoe UI', cursive, sans-serif;
            overflow: hidden;
            color: #ffd700;
            text-align: center;
        }

        h1 {
            text-shadow: 3px 3px 6px rgba(0,0,0,0.7);
            margin-bottom: 10px;
            font-size: 2.2rem;
            padding: 0 10px;
        }

        #wheel-container { 
            position: relative; 
            margin-bottom: 30px; 
            z-index: 2;
        }

        canvas { 
            border: 8px solid #ffd700;
            border-radius: 50%; 
            box-shadow: 0 0 40px rgba(0,0,0,0.6), 0 0 20px #ffd700; 
            max-width: 85vw; 
            background-color: white;
        }

        #pointer { 
            position: absolute; 
            top: -15px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 0; 
            height: 0; 
            border-left: 20px solid transparent; 
            border-right: 20px solid transparent; 
            border-top: 40px solid #ffd700;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5));
            z-index: 10; 
        }

        button { 
            padding: 18px 45px; 
            font-size: 1.4rem; 
            font-weight: bold;
            cursor: pointer; 
            background: linear-gradient(#ffd700, #b8860b);
            color: #003300; 
            border: 3px solid #fff; 
            border-radius: 50px; 
            transition: 0.3s; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover { 
            transform: scale(1.1); 
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.6);
        }

        button:disabled { 
            background: #7f8c8d; 
            cursor: not-allowed; 
            opacity: 0.7; 
        }

        .clover {
            position: absolute;
            top: -50px;
            font-size: 24px;
            z-index: 1;
            user-select: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(105vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <h1>☘️ Spin for Luck ☘️</h1>

    <div id="wheel-container">
        <div id="pointer"></div>
        <canvas id="wheel" width="400" height="400"></canvas>
    </div>

    <button id="spinBtn">Test Your Luck!</button>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');

        // --- FUN ST. PADDY'S OPTIONS ---
        const options = [
            "Kiss 💋", 
            "Chug duel 🍺", 
            "Chug your drink 🥃", 
            "The Dealer Chugs 🍻",
            "Hug ☘️",
            "Challenge ✨"
        ];
        
        const colors = ["#2e7d32", "#ffd700", "#1b5e20", "#fbc02d", "#4caf50", "#c0ca33"];
        
        let startAngle = 0;
        const arc = Math.PI / (options.length / 2);
        let spinTimeout = null;
        let spinAngleStart = 10;
        let spinTime = 0;
        let spinTimeTotal = 0;
        let isSpinning = false;

        function drawWheel() {
            ctx.clearRect(0,0,400,400);
            options.forEach((text, i) => {
                const angle = startAngle + i * arc;
                ctx.fillStyle = colors[i % colors.length];
                ctx.beginPath();
                ctx.moveTo(200, 200);
                ctx.arc(200, 200, 200, angle, angle + arc, false);
                ctx.lineTo(200, 200);
                ctx.fill();

                ctx.save();
                ctx.fillStyle = (colors[i % colors.length] === "#ffd700" || colors[i % colors.length] === "#fbc02d") ? "#003300" : "white";
                ctx.translate(200 + Math.cos(angle + arc / 2) * 140, 200 + Math.sin(angle + arc / 2) * 140);
                ctx.rotate(angle + arc / 2 + Math.PI / 2);
                ctx.font = 'bold 14px Arial';
                // On ajuste l'affichage pour les noms longs
                ctx.fillText(text, -ctx.measureText(text).width / 2, 0);
                ctx.restore();
            });
        }

        function rotateWheel() {
            spinTime += 30;
            if(spinTime >= spinTimeTotal) { stopRotateWheel(); return; }
            const spinAngle = spinAngleStart - easeOut(spinTime, 0, spinAngleStart, spinTimeTotal);
            startAngle += (spinAngle * Math.PI / 180);
            drawWheel();
            spinTimeout = setTimeout(rotateWheel, 30);
        }

        function stopRotateWheel() {
            clearTimeout(spinTimeout);
            isSpinning = false; 
            spinBtn.disabled = false;
            const degrees = startAngle * 180 / Math.PI + 90;
            const arcd = arc * 180 / Math.PI;
            const index = Math.floor((360 - degrees % 360) / arcd);
            
            // Pop-up fun
            alert("✨ Destiny says: " + options[index] + " ! ✨");
        }

        function easeOut(t, b, c, d) {
            const ts = (t /= d) * t;
            const tc = ts * t;
            return b + c * (tc + -3 * ts + 3 * t);
        }

        spinBtn.addEventListener('click', () => {
            if (isSpinning) return; 
            isSpinning = true;
            spinBtn.disabled = true;
            spinAngleStart = Math.random() * 10 + 10;
            spinTime = 0;
            spinTimeTotal = Math.random() * 3000 + 4000;
            rotateWheel();
        });

        function createClover() {
            const clover = document.createElement('div');
            clover.classList.add('clover');
            // Alterne entre trèfles et cœurs pour le thème Love & Luck
            clover.innerHTML = Math.random() > 0.5 ? '☘️' : '🍀';
            clover.style.left = Math.random() * 100 + 'vw';
            clover.style.animationDuration = Math.random() * 3 + 2 + 's';
            clover.style.opacity = Math.random();
            document.body.appendChild(clover);
            setTimeout(() => { clover.remove(); }, 5000);
        }

        setInterval(createClover, 400);
        drawWheel();
    </script>
</body>
</html>
